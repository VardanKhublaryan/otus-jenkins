- view:
    name: QA
    view-type: list
    description: |
      <div style="background: #1e3c72; color: white; padding: 10px; border-radius: 5px;">
          <h2 style="margin: 0;">🚀 QA AUTOMATION HUB</h2>
      </div>
    filter-executors: true
    filter-queue: true
    # ADD ALL YOUR JOB NAMES HERE
    job-name:
      - 'Api_tests'
      - 'Web_tests'
      - 'runner_job'
      - 'upload_jobs'
    columns:
      - status
      - weather
      - job
      - last-success
      - last-failure
      - last-duration
      - build-button