- view:
    name: "QA Dashboard"
    view-type: dashboard  # Requires Dashboard View Plugin
    description: |
      <div style="background-color: #f0f0f0; padding: 10px; border-left: 5px solid red;">
        <h2 style="margin: 0; color: #333;">🚀 QA Testing Suite</h2>
        <p style="color: #666;">Automated API and Web regression tests.</p>
      </div>
    filter-executors: true
    filter-queue: true
    job-name:
      - 'upload_jobs'
      - 'Web_tests'
      - 'Api_tests'
    columns:
      - status
      - weather
      - job
      - last-success
      - last-failure
      - last-duration
      - build-button
      - "last-stable" # Adds more context